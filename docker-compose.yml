# Aleph Docs — one-command Docker stack.
#
# Usage:
#   1. cp .env.docker.example .env
#   2. Edit .env — at minimum set GOOGLE_API_KEY (for embeddings).
#   3. Put your .md / .pdf / .png / .mp4 / .wav files under ./docs/ .
#   4. docker compose up --build
#   5. Open the viewer at  http://localhost:8765/
#   6. Point Claude Desktop at http://localhost:8001/mcp  with
#      `Authorization: Bearer ${MCP_API_KEY}`
#
# Services:
#   db     : PostgreSQL 16 + pgvector (persistent volume)
#   mcp    : MCP server (doc indexer + semantic memory) on :8001
#   aleph  : FastAPI backend + bundled frontend on :8765
#
# Everything is local-only by default — add your own reverse proxy / TLS
# / auth in front when going public.

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DB:-aleph_memory}
      POSTGRES_USER: ${PG_USER:-aleph}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-aleph_dev_password_change_me}
      # The schema init script reads EMBED_DIM to size the pgvector
      # column. Must match EMBED_DIM on the mcp/aleph services.
      EMBED_DIM: ${EMBED_DIM:-1536}
    volumes:
      - db_data:/var/lib/postgresql/data
      # Init scripts run in lexical order. 01 = extensions + grants,
      # 02 = MCP memory schema (via wrapper that sed-renders the
      # vector(N) dim from EMBED_DIM), 03 = Aleph graph_snapshot,
      # 04 = NOTIFY triggers. The schema.sql itself is mounted
      # OUTSIDE initdb.d as a template so the wrapper reads it.
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/init-memory.sh:/docker-entrypoint-initdb.d/02-memory.sh:ro
      - ./mcp/memory/schema.sql:/var/lib/aleph/schema-memory.sql:ro
      - ./aleph/backend/schema_additions.sql:/docker-entrypoint-initdb.d/03-aleph.sql:ro
      - ./aleph/backend/triggers.sql:/docker-entrypoint-initdb.d/04-triggers.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${PG_USER:-aleph}", "-d", "${PG_DB:-aleph_memory}"]
      interval: 5s
      timeout: 3s
      retries: 10

  mcp:
    build:
      context: .
      target: mcp
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${MCP_PORT:-8001}:8001"
    environment:
      # Postgres
      PG_DSN: postgresql://${PG_USER:-aleph}:${PG_PASSWORD:-aleph_dev_password_change_me}@db:5432/${PG_DB:-aleph_memory}
      MEMORY_ENABLED: "true"
      # MCP server
      MCP_API_KEY: "${MCP_API_KEY:?set MCP_API_KEY in .env - generate with openssl rand -hex 32}"
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8001
      MCP_SERVER_NAME: ${MCP_SERVER_NAME:-AlephDocs}
      # Docs source — LOCAL_DOCS_PATH maps to /docs mount below.
      DOCS_REPO_URL: ${DOCS_REPO_URL:-}
      DOCS_REPO_BRANCH: ${DOCS_REPO_BRANCH:-main}
      DOCS_REPO_TOKEN: ${DOCS_REPO_TOKEN:-}
      LOCAL_DOCS_PATH: /docs
      CONTENT_SUBDIR: ${CONTENT_SUBDIR:-}
      # Embedding backend selection
      EMBED_BACKEND: ${EMBED_BACKEND:-gemini-001}
      EMBED_DIM: ${EMBED_DIM:-1536}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      EMBED_MODEL: ${EMBED_MODEL:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-bge-m3}
      LOCAL_EMBED_DIM: ${LOCAL_EMBED_DIM:-1024}
      # nomic_multimodal_local backend — host-side FastAPI server that
      # loads nomic-embed-text-v1.5 + nomic-embed-vision-v1.5. See
      # docs/EMBED_NOMIC_SETUP.md for the host setup.
      EMBED_NOMIC_HOST: ${EMBED_NOMIC_HOST:-http://host.docker.internal:8091}
      EMBED_NOMIC_TIMEOUT_S: ${EMBED_NOMIC_TIMEOUT_S:-60}
      # Reconciler: set false to skip the boot-time media scan and rely
      # only on the watcher (local mode) or on-demand reindex_docs().
      INGEST_MEDIA_ON_BOOT: ${INGEST_MEDIA_ON_BOOT:-true}
      # Hybrid media embedding: when true (default), video scenes are
      # embedded as video AND the Whisper transcript is embedded as text
      # (paired rows). When false, only text-embedded chunks are created
      # (video_transcript, audio_transcript, pdf_text) — no Gemini spend
      # on video/image modalities. Set false for a zero-cost text-only
      # pipeline with EMBED_BACKEND=local (Ollama).
      HYBRID_MEDIA_EMBEDDING: ${HYBRID_MEDIA_EMBEDDING:-true}
      # ASR backend selection — one of whisper_local (default, free),
      # openai ($0.006/min), gemini (~$0.01/min). See README.
      ASR_BACKEND: ${ASR_BACKEND:-whisper_local}
      ASR_ENABLED: ${ASR_ENABLED:-true}
      ASR_LANGUAGE: ${ASR_LANGUAGE:-}
      ASR_TIMEOUT_S: ${ASR_TIMEOUT_S:-600}
      # whisper_local backend — host bridge and model choice.
      ASR_HOST: ${ASR_HOST:-}
      ASR_MODEL: ${ASR_MODEL:-large-v3}
      # openai backend — requires OPENAI_API_KEY.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ASR_OPENAI_MODEL: ${ASR_OPENAI_MODEL:-whisper-1}
      # gemini backend — reuses GOOGLE_API_KEY above.
      ASR_GEMINI_MODEL: ${ASR_GEMINI_MODEL:-gemini-2.5-flash}
      # Lint
      LINT_MODE: ${LINT_MODE:-auto}
      # Optional: doc-patch PR back to canonical git
      DOCS_WRITE_TOKEN: ${DOCS_WRITE_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./docs:/docs:ro
      - mcp_data:/data

  aleph:
    build:
      context: .
      target: aleph
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mcp:
        condition: service_started
    ports:
      - "${ALEPH_PORT:-8765}:8765"
    environment:
      PG_DSN: postgresql://${PG_USER:-aleph}:${PG_PASSWORD:-aleph_dev_password_change_me}@db:5432/${PG_DB:-aleph_memory}
      MEMORY_ENABLED: "true"
      ALEPH_API_KEY: "${ALEPH_API_KEY:?set ALEPH_API_KEY in .env - generate with openssl rand -hex 32}"
      ALEPH_HOST: 0.0.0.0
      ALEPH_PORT: 8765
      MCP_PATH: /app/mcp
      EMBED_BACKEND: ${EMBED_BACKEND:-gemini-001}
      EMBED_DIM: ${EMBED_DIM:-1536}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      MEDIA_ROOT: /docs
      # Auto-projection task: rebuilds the 3D graph snapshot as memories
      # change. Debounce + max-staleness (seconds).
      AUTO_PROJECTION: ${AUTO_PROJECTION:-true}
      PROJECTION_DEBOUNCE_S: ${PROJECTION_DEBOUNCE_S:-30}
      PROJECTION_MAX_STALE_S: ${PROJECTION_MAX_STALE_S:-120}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./docs:/docs:ro

volumes:
  db_data:
  mcp_data:
